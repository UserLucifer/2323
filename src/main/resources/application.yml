server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: compute-rental-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/compute_rental?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    hikari:
      pool-name: ComputeRentalHikariPool
      maximum-pool-size: ${MYSQL_POOL_MAX_SIZE:20}
      minimum-idle: ${MYSQL_POOL_MIN_IDLE:5}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:3s}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: ${RABBITMQ_PREFETCH:20}
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${SMTP_SSL_ENABLE:true}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:false}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.compute.rental.modules
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  time-zone: Asia/Shanghai
  jwt:
    issuer: ${JWT_ISSUER:compute-rental}
    secret: ${JWT_SECRET:dev-only-change-me-32-bytes-minimum-secret}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:2h}
  api-token:
    encryption-secret: ${API_TOKEN_ENCRYPTION_SECRET:dev-only-token-secret-change-me}
    base-url: ${API_TOKEN_BASE_URL:https://api.example.invalid/v1}
  auth:
    email-code-ttl: ${AUTH_EMAIL_CODE_TTL:5m}
    email-code-length: ${AUTH_EMAIL_CODE_LENGTH:6}
    email-code-rate-limit-per-minute: ${AUTH_EMAIL_CODE_RATE_LIMIT_PER_MINUTE:5}
    email-from: ${MAIL_FROM:no-reply@example.invalid}
    email-subject: ${AUTH_EMAIL_SUBJECT:Compute Rental login verification code}
  websocket:
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:*}
  scheduler:
    daily-profit-cron: ${SCHEDULER_DAILY_PROFIT_CRON:0 5 0 * * *}
    order-expire-settle-cron: ${SCHEDULER_ORDER_EXPIRE_SETTLE_CRON:0 10 0 * * *}
    auto-pause-cron: ${SCHEDULER_AUTO_PAUSE_CRON:0 */5 * * * *}
    activation-timeout-cancel-cron: ${SCHEDULER_ACTIVATION_TIMEOUT_CANCEL_CRON:0 */10 * * * *}
